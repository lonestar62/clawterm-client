<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClawTerm</title>
  <link rel="stylesheet" href="/lib/css/xterm.css" />
  <link rel="stylesheet" href="style.css">
  <style>
    .hdr-label {
      font-size: 10px;
      color: #555;
      white-space: nowrap;
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 1px;
    }
    #applid-input {
      background: #0a0a0a;
      border: 1px solid #00ff4144;
      color: #00ff41;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      font-weight: 700;
      padding: 3px 8px;
      width: 76px;
      text-transform: uppercase;
      letter-spacing: 2px;
      outline: none;
      border-radius: 3px;
    }
    #applid-input:focus { border-color: #00ff41; box-shadow: 0 0 6px #00ff4133; }
    .layer-pill {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 10px; border-radius: 5px;
      background: #0d0d0d; border: 1px solid #1a1a1a;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px; font-weight: 700; letter-spacing: 0.05em;
    }
    .layer-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #ff4444; transition: background 0.3s, box-shadow 0.3s;
    }
    .layer-label { color: #333; font-size: 9px; letter-spacing: 0.12em; }
    .layer-value { color: #555; }
  </style>
</head>
<body>
  <div id="header">
    <span id="logo">&#x26a1; CLAWTERM</span>

    <!-- Two-layer status -->
    <div class="layer-pill" title="Layer 1: Bridge / Controller">
      <span class="layer-dot" id="l1-dot"></span>
      <span class="layer-label">BRIDGE</span>
      <span class="layer-value" id="l1-val">offline</span>
    </div>
    <div class="layer-pill" title="Layer 2: Target agent session">
      <span class="layer-dot" id="l2-dot"></span>
      <span class="layer-label">AGENT</span>
      <span class="layer-value" id="l2-val">no session</span>
    </div>

    <!-- Hidden legacy diag elements (keep for JS compat) -->
    <span id="diag-ws" style="display:none"></span>
    <span id="diag-ip" style="display:none"></span>
    <span id="diag-vt" style="display:none"></span>

    <span class="hdr-sep">|</span>

    <span class="hdr-label">APPLID:</span>
    <input type="text" id="applid-input" value="BABY1" maxlength="8"
           placeholder="APPLID" title="Target APPLID — F2 for logon screen">

    <span class="hdr-sep">|</span>

    <button class="hdr-btn act-btn" id="btn-connect">Connect</button>
    <button class="hdr-btn act-btn amber" id="btn-resume">Resume</button>
    <button class="hdr-btn act-btn red-btn" id="btn-disconnect">Disconnect</button>

    <span class="hdr-sep">|</span>

    <button class="hdr-btn fkey-btn" id="btn-f1">Help</button>
    <button class="hdr-btn fkey-btn" id="btn-f2">VTAM</button>
    <button class="hdr-btn fkey-btn" id="btn-f3">Sessions</button>
    <button class="hdr-btn fkey-btn" id="btn-f5">Resume</button>
    <button class="hdr-btn fkey-btn" id="btn-f9">Ping</button>

    <span class="hdr-sep">|</span>
    <span id="session-info">no session</span>
  </div>

  <div id="terminal-container"></div>

  <!-- On-screen diagnostics overlay -->
  <div id="diag-panel" style="
    position:fixed; bottom:40px; right:12px; z-index:100;
    background:rgba(8,8,8,0.92); border:1px solid #1e1e1e;
    border-radius:6px; padding:8px 12px;
    font-family:'JetBrains Mono',monospace; font-size:10px;
    line-height:1.9; min-width:200px; pointer-events:none;
  ">
    <div style="color:#2a2a2a;font-size:9px;letter-spacing:0.15em;margin-bottom:2px;">DIAGNOSTICS</div>
    <div id="dp-internet"><span class="dp-dot" id="dp-internet-dot">●</span> <span id="dp-internet-txt" style="color:#333;">INTERNET  ...</span></div>
    <div id="dp-xterm"><span class="dp-dot" id="dp-xterm-dot">●</span> <span id="dp-xterm-txt" style="color:#333;">XTERM     ...</span></div>
    <div id="dp-bridge"><span class="dp-dot" id="dp-bridge-dot">●</span> <span id="dp-bridge-txt" style="color:#333;">BRIDGE    waiting</span></div>
    <div id="dp-agent"><span class="dp-dot" id="dp-agent-dot">●</span> <span id="dp-agent-txt" style="color:#333;">AGENT     no session</span></div>
  </div>

  <div id="footer">
    <span id="footer-session">session: —</span>
    <span id="footer-status">ClawTerm v0.1.0 · lobster-1</span>
  </div>

  <script src="/lib/xterm.js"></script>
  <script src="/lib/xterm-addon-fit.js"></script>
  <script src="clawterm.js"></script>
  <script>
    // ── APPLID table ──────────────────────────────────────────────────────
    const APPLIDS = [
      { applid: 'BABY1',  desc: 'Baby Claw 001',           host: '100.114.163.66',  port: 30801, active: true  },
      { applid: 'BABY2',  desc: 'Baby Claw 002',           host: '100.114.163.66',  port: 30802, active: false },
      { applid: 'BABY3',  desc: 'Baby Claw 003',           host: '100.114.163.66',  port: 30805, active: true  },
      { applid: 'BABY4',  desc: 'Baby Claw 004',           host: '100.114.163.66',  port: 30803, active: true  },
      { applid: 'BABY5',  desc: 'Baby Claw 005',           host: '100.114.163.66',  port: 30804, active: true  },
    ];

    let uiState = 'splash';
    let vtamRefreshTimer = null;
    let isConnecting = false;
    const applidInput = document.getElementById('applid-input');
    function getApplid() {
      return (applidInput.value || 'BABY1').toUpperCase().padEnd(8, ' ').substring(0, 8);
    }

    // ── Diagnostics ───────────────────────────────────────────────────────
    const _ds = { ws: 'red', ip: 'red', vt: 'red' };

    function dpSet(id, color, text) {
      const dot = document.getElementById('dp-' + id + '-dot');
      const txt = document.getElementById('dp-' + id + '-txt');
      if (!dot || !txt) return;
      const cols = { green: '#00e676', yellow: '#ffd740', red: '#ff4444', grey: '#333' };
      dot.style.color = cols[color] || '#333';
      dot.style.textShadow = color === 'green' ? '0 0 4px #00e676' : color === 'yellow' ? '0 0 4px #ffd740' : 'none';
      txt.style.color = color === 'grey' ? '#333' : (cols[color] || '#333');
      txt.textContent = text;
    }

    function layerSet(layer, color, val) {
      const dot = document.getElementById('l' + layer + '-dot');
      const valEl = document.getElementById('l' + layer + '-val');
      if (!dot || !valEl) return;
      const cols = { green: '#00e676', yellow: '#ffd740', red: '#ff4444', grey: '#333' };
      dot.style.background = cols[color] || '#333';
      dot.style.boxShadow = color === 'green' ? '0 0 5px #00e676' : color === 'yellow' ? '0 0 5px #ffd740' : 'none';
      valEl.style.color = color === 'grey' ? '#333' : (cols[color] || '#333');
      valEl.textContent = val;
    }

    function setDiag(id, state, tooltip) {
      _ds[id] = state;
      const el = document.getElementById('diag-' + id);
      if (el) el.className = state;

      const applid = applidInput.value.trim().toUpperCase();

      // Layer 1 = BRIDGE (ws state)
      if (id === 'ws') {
        if (state === 'green') { layerSet(1,'green','fleet-vm ✓'); dpSet('bridge','green','BRIDGE    fleet-vm ✓'); }
        else if (state === 'yellow') { layerSet(1,'yellow','connecting...'); dpSet('bridge','yellow','BRIDGE    connecting...'); }
        else { layerSet(1,'grey','offline'); dpSet('bridge','grey','BRIDGE    waiting'); }
      }

      // Layer 2 = AGENT (ip/vt state)
      if (id === 'ip') {
        if (state === 'green') { layerSet(2,'green', applid + ' ✓'); dpSet('agent','green','AGENT     ' + applid + ' ✓'); }
        else if (state === 'yellow') { layerSet(2,'yellow', applid + ' auth...'); dpSet('agent','yellow','AGENT     ' + applid + ' auth...'); }
        else { layerSet(2,'grey','no session'); dpSet('agent','grey','AGENT     no session'); }
      }
      if (id === 'vt') {
        if (state === 'green') { layerSet(2,'green', applid + ' LIVE'); dpSet('agent','green','AGENT     ' + applid + ' LIVE ●'); }
        else if (state === 'red') { layerSet(2,'red','disconnected'); dpSet('agent','red','AGENT     disconnected'); }
      }
    }

    // ── xterm.js setup ────────────────────────────────────────────────────
    const term = new Terminal({
      theme: {
        background: '#0a0a0a', foreground: '#00ff41',
        cursor: '#00ff41', cursorAccent: '#0a0a0a',
        selection: '#00ff4122',
        green: '#00ff41', brightGreen: '#69ff47',
        cyan: '#00b4d8', brightCyan: '#90e0ef',
        yellow: '#ffcc44', red: '#ff6666',
        white: '#cccccc', brightWhite: '#ffffff',
      },
      fontFamily: '"JetBrains Mono", "Fira Code", monospace',
      fontSize: 14, lineHeight: 1.2,
      cursorBlink: true, cursorStyle: 'block',
      scrollback: 2000, convertEol: true,
    });
    const fitAddon = new FitAddon.FitAddon();
    term.loadAddon(fitAddon);
    term.open(document.getElementById('terminal-container'));
    fitAddon.fit();
    window.addEventListener('resize', () => fitAddon.fit());

    // ── Boot diagnostics ──────────────────────────────────────────────────
    // Check xterm loaded
    if (typeof Terminal !== 'undefined') {
      dpSet('xterm', 'green', 'XTERM     v5.3 ok');
    } else {
      dpSet('xterm', 'red', 'XTERM     FAILED');
    }
    // Check internet
    fetch('/lib/xterm.js', { method: 'HEAD' })
      .then(() => dpSet('internet', 'green', 'INTERNET  ok'))
      .catch(() => dpSet('internet', 'red', 'INTERNET  error'));

    // ── ANSI helpers ──────────────────────────────────────────────────────
    const A = {
      reset:  '\x1b[0m',
      cyan:   '\x1b[36m', bcyan: '\x1b[96m',
      white:  '\x1b[37m', bwhite: '\x1b[97m',
      bgreen: '\x1b[92m', dim: '\x1b[2m',
    };
    function vis(s) { return s.replace(/\x1b\[[0-9;]*m/g, ''); }
    const INNER = 66;
    function bl(content) {
      const pad = Math.max(0, INNER - vis(content).length);
      return A.cyan + '\u2551' + A.reset + content + ' '.repeat(pad) + A.cyan + '\u2551' + A.reset;
    }
    const BOX_TOP = A.cyan + '\u2554' + '\u2550'.repeat(INNER) + '\u2557' + A.reset;
    const BOX_SEP = A.cyan + '\u2560' + '\u2550'.repeat(INNER) + '\u2563' + A.reset;
    const BOX_BOT = A.cyan + '\u255a' + '\u2550'.repeat(INNER) + '\u255d' + A.reset;
    const BOX_BLK = bl('');

    // ── VTAM screen ───────────────────────────────────────────────────────
    function renderVtam() {
      const rawVal = (applidInput.value || '').toUpperCase().substring(0, 8);
      const rest   = 8 - rawVal.length;
      const applidLine =
        A.white + '  APPLID  \u25b6  ' + A.reset +
        (rawVal ? A.bgreen + rawVal + A.reset : '') +
        (rest > 0 ? A.dim + '_'.repeat(rest) + A.reset : '');
      const L = A.bcyan, R = A.reset;
      const logo = [
        L+' \u2588\u2588\u2588\u2588\u2588\u2588\u2557\u2588\u2588\u2557      \u2588\u2588\u2588\u2588\u2588\u2557 \u2588\u2588\u2557    \u2588\u2588\u2557\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2557\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2557\u2588\u2588\u2588\u2588\u2588\u2588\u2557 \u2588\u2588\u2588\u2557   \u2588\u2588\u2588\u2557'+R,
        L+'\u2588\u2588\u2554\u2550\u2550\u2550\u2550\u255d\u2588\u2588\u2551     \u2588\u2588\u2554\u2550\u2550\u2588\u2588\u2557\u2588\u2588\u2551    \u2588\u2588\u2551\u255a\u2550\u2550\u2588\u2588\u2554\u2550\u2550\u255d\u2588\u2588\u2554\u2550\u2550\u2550\u2550\u255d\u2588\u2588\u2554\u2550\u2550\u2588\u2588\u2557\u2588\u2588\u2588\u2588\u2557 \u2588\u2588\u2588\u2588\u2551'+R,
        L+'\u2588\u2588\u2551     \u2588\u2588\u2551     \u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2551\u2588\u2588\u2551 \u2588\u2557 \u2588\u2588\u2551   \u2588\u2588\u2551   \u2588\u2588\u2588\u2588\u2588\u2557  \u2588\u2588\u2588\u2588\u2588\u2588\u2554\u255d\u2588\u2588\u2554\u2588\u2588\u2588\u2588\u2554\u2588\u2588\u2551'+R,
        L+'\u2588\u2588\u2551     \u2588\u2588\u2551     \u2588\u2588\u2554\u2550\u2550\u2588\u2588\u2551\u2588\u2588\u2551\u2588\u2588\u2588\u2557\u2588\u2588\u2551   \u2588\u2588\u2551   \u2588\u2588\u2554\u2550\u2550\u255d  \u2588\u2588\u2554\u2550\u2550\u2588\u2588\u2557\u2588\u2588\u2551\u255a\u2588\u2588\u2554\u255d\u2588\u2588\u2551'+R,
        L+'\u255a\u2588\u2588\u2588\u2588\u2588\u2588\u2557\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2557\u2588\u2588\u2551  \u2588\u2588\u2551\u255a\u2588\u2588\u2588\u2554\u2588\u2588\u2588\u2554\u255d   \u2588\u2588\u2551   \u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2557\u2588\u2588\u2551  \u2588\u2588\u2551\u2588\u2588\u2551 \u255a\u2550\u255d \u2588\u2588\u2551'+R,
        L+' \u255a\u2550\u2550\u2550\u2550\u2550\u255d\u255a\u2550\u2550\u2550\u2550\u2550\u2550\u255d\u255a\u2550\u255d  \u255a\u2550\u255d \u255a\u2550\u2550\u255d\u255a\u2550\u2550\u255d    \u255a\u2550\u255d   \u255a\u2550\u2550\u2550\u2550\u2550\u2550\u255d\u255a\u2550\u255d  \u255a\u2550\u255d\u255a\u2550\u255d     \u255a\u2550\u255d'+R,
      ];
      const net1 = A.white+'  NETWORK  :  '+A.bgreen+'CLAWNET-1'+A.white+'          NODE  :  '+A.bgreen+'LOBSTER-1'+A.reset;
      const net2 = A.white+'  PROTOCOL :  '+A.bgreen+'CLAWTERM V0.1'+A.white+'      PORT  :  '+A.bgreen+'7220'+A.reset;
      const applidRows = APPLIDS.map(a => {
        const dot  = a.active ? A.bgreen + '\u25cf' + A.reset : A.dim + '\u25cb' + A.reset;
        const name = A.bwhite + a.applid.padEnd(8) + A.reset;
        const desc = A.white  + a.desc.padEnd(27)  + A.reset;
        const addr = A.dim    + a.host + ':' + a.port + A.reset;
        return bl('  ' + name + dot + '  ' + desc + addr);
      });
      const fkbar = '  '+A.bcyan+'ENTER'+A.white+'=LOGON  '+A.bcyan+'F1'+A.white+'=HELP  '+A.bcyan+'F3'+A.white+'=LIST  '+A.bcyan+'F5'+A.white+'=RESUME  '+A.bcyan+'F9'+A.white+'=PING  '+A.bcyan+'ESC'+A.white+'=BACK'+A.reset;
      term.write('\x1b[2J\x1b[H');
      term.writeln(BOX_TOP);
      term.writeln(BOX_BLK);
      logo.forEach(line => term.writeln(bl(line)));
      term.writeln(BOX_BLK);
      term.writeln(bl(net1));
      term.writeln(bl(net2));
      term.writeln(BOX_BLK);
      term.writeln(BOX_SEP);
      term.writeln(BOX_BLK);
      term.writeln(bl(applidLine));
      term.writeln(BOX_BLK);
      term.writeln(BOX_SEP);
      applidRows.forEach(row => term.writeln(row));
      term.writeln(BOX_SEP);
      term.write(bl(fkbar));
    }

    function showVtam() {
      uiState = 'vtam';
      renderVtam();
      applidInput.focus();
      applidInput.select();
      if (vtamRefreshTimer) clearInterval(vtamRefreshTimer);
      vtamRefreshTimer = setInterval(() => { if (uiState === 'vtam') renderVtam(); }, 150);
    }

    function stopVtamRefresh() {
      if (vtamRefreshTimer) { clearInterval(vtamRefreshTimer); vtamRefreshTimer = null; }
    }

    function showSplash() {
      uiState = 'splash';
      stopVtamRefresh();
      term.write('\x1b[2J\x1b[H');
      term.writeln('\x1b[36m  ClawTerm v0.1.0\x1b[0m\r\n');
      term.writeln('  \x1b[90mSession-persistent AI terminal · CNA protocol\x1b[0m\r\n');
      term.writeln('  Press \x1b[92mF2\x1b[0m for logon screen · \x1b[32mConnect\x1b[0m to quick-connect · \x1b[36mF1\x1b[0m for help\r\n');
    }

    // ── ClawTerm connection ───────────────────────────────────────────────
    const wsUrl = (applid) => 'wss://' + window.location.host + '/clawterm-ws?applid=' + encodeURIComponent(applid);
    let client = null;

    function getOrCreateClient(applid) {
      if (client) { try { client.disconnect(); } catch(e) {} }
      client = new ClawTermClient(wsUrl(applid));
      return client;
    }

    function doConnect(resumeId, applid) {
      if (isConnecting) return;
      isConnecting = true;
      setTimeout(() => { isConnecting = false; }, 3000);
      stopVtamRefresh();
      uiState = 'session';
      const applidStr = (applid || getApplid()).toUpperCase().padEnd(8,' ').substring(0,8);
      const cl = getOrCreateClient(applidStr.trim());

      setDiag('ws', 'yellow', 'connecting...');
      setDiag('ip', 'red', 'waiting...');
      setDiag('vt', 'red', 'no session');

      cl.ws.onopen = () => {
        setDiag('ws', 'green', 'bridge ok');
        setDiag('ip', 'yellow', 'authenticating...');
        term.write('\x1b[2J\x1b[H');
        term.writeln('\x1b[32m[BRIDGE]\x1b[0m \u2713 fleet-vm connected');
        term.writeln('\x1b[33m[AGENT]\x1b[0m  authenticating ' + applidStr.trim() + '...');
      };

      cl.ws.onerror = () => {
        setDiag('ws', 'red', 'failed');
        setDiag('ip', 'red', 'failed');
        term.writeln('\x1b[31m[BRIDGE]\x1b[0m \u2717 WebSocket failed');
      };

      cl.onIpUp = () => {
        setDiag('ip', 'green', 'agent ok');
        term.writeln('\x1b[32m[AGENT]\x1b[0m  \u2713 gateway authenticated');
      };

      cl.onIpDown = (reason) => {
        setDiag('ip', 'red', 'lost');
        setDiag('vt', 'red', 'suspended');
        term.writeln('\x1b[31m[AGENT]\x1b[0m \u2717 lost: ' + (reason || 'closed'));
      };

      cl.onConnect = (sessionId) => {
        const hex = '0x' + sessionId.toString(16).padStart(8,'0').toUpperCase();
        setDiag('vt', 'green', 'live');
        document.getElementById('session-info').textContent = applidStr.trim() + ' · ' + hex;
        document.getElementById('footer-session').textContent = 'session: ' + hex;
        localStorage.setItem('clawterm_session_id', sessionId);
        isConnecting = false;
        term.writeln('\x1b[32m[SESSION]\x1b[0m \u2713 ' + hex + ' — type to send\r\n');
        term.write('\x1b[32m$\x1b[0m ');
      };

      cl.onData = (text) => term.write(text);

      cl.onDisconnect = () => {
        setDiag('ws', 'red', 'closed');
        setDiag('ip', 'red', 'closed');
        setDiag('vt', 'red', 'suspended');
        document.getElementById('session-info').textContent = 'suspended';
        isConnecting = false;
        term.writeln('\r\n\x1b[31m[BRIDGE]\x1b[0m Disconnected — F5 to resume\r\n');
      };

      cl.connect(resumeId, applidStr);
    }

    term.onData((data) => {
      if (uiState !== 'session' || !client) return;
      client.sendData(data);
      term.write(data);
    });

    function handleEsc() {
      if (uiState === 'session' && client) {
        client.suspend();
        setDiag('vt', 'red', 'suspended');
        document.getElementById('session-info').textContent = 'suspended';
        showVtam();
      } else if (uiState === 'vtam') {
        stopVtamRefresh();
        showSplash();
      }
    }

    // Intercept F5 before Firefox can steal it
    document.addEventListener('keydown', (e) => {
      if (e.key === 'F5') { e.preventDefault(); e.stopPropagation(); document.getElementById('btn-f5').click(); }
    }, true); // capture phase

        // ── Button handlers ───────────────────────────────────────────────────
    document.getElementById('btn-connect').onclick    = () => doConnect(null);
    document.getElementById('btn-disconnect').onclick = () => {
      if (client) client.disconnect();
      setDiag('ws','red',''); setDiag('ip','red',''); setDiag('vt','red','');
      document.getElementById('session-info').textContent = 'no session';
      showSplash();
    };
    document.getElementById('btn-f9').onclick = () => { if (client) client.sendPing(); };
    document.getElementById('btn-resume').onclick =
    document.getElementById('btn-f5').onclick = () => {
      const saved = localStorage.getItem('clawterm_session_id');
      if (saved) doConnect(parseInt(saved));
      else showVtam();
    };
    document.getElementById('btn-f1').onclick = () => {
      term.writeln('\r\n\x1b[96mF1=Help F2=VTAM F5=Resume F9=Ping ESC=Back\x1b[0m\r\n');
    };
    document.getElementById('btn-f2').onclick = () => showVtam();
    document.getElementById('btn-f3').onclick = () => {
      const s = localStorage.getItem('clawterm_session_id');
      term.writeln('\r\n\x1b[96mSaved: ' + (s ? '0x'+parseInt(s).toString(16).toUpperCase() : 'none') + '\x1b[0m\r\n');
    };

    applidInput.addEventListener('input', () => { if (uiState === 'vtam') renderVtam(); });
    applidInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && uiState === 'vtam') { e.preventDefault(); doConnect(null, getApplid()); }
      if (e.key === 'Escape') { e.preventDefault(); handleEsc(); }
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && document.activeElement !== applidInput) { e.preventDefault(); handleEsc(); return; }
      if (e.key === 'Enter' && uiState === 'vtam' && document.activeElement !== applidInput) { e.preventDefault(); doConnect(null, getApplid()); return; }
      if (e.key === 'F1') { e.preventDefault(); document.getElementById('btn-f1').click(); }
      if (e.key === 'F2') { e.preventDefault(); document.getElementById('btn-f2').click(); }
      if (e.key === 'F3') { e.preventDefault(); document.getElementById('btn-f3').click(); }
      if (e.key === 'F5') { e.preventDefault(); e.stopPropagation(); document.getElementById('btn-f5').click(); }
      if (e.key === 'F9') { e.preventDefault(); document.getElementById('btn-f9').click(); }
    });

    // ── Boot ──────────────────────────────────────────────────────────────
    showSplash();
  </script>
</body>
</html>
